name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: self-hosted

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Add .NET tools to PATH
        shell: powershell
        run: echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Sonar Begin
        run: >
          dotnet-sonarscanner begin
          /k:"vlimat-backend"
          /d:sonar.host.url="http://localhost:9000"
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          /d:sonar.exclusions="**/bin/**,**/obj/**,**/node_modules/**"

      - name: Restore
        run: dotnet restore ./VLimat.Eduz.App/VLimat.Eduz.App/VLimat.Eduz.App.csproj

      - name: Build
        run: dotnet build ./VLimat.Eduz.App/VLimat.Eduz.App/VLimat.Eduz.App.csproj -c Release --no-restore

      - name: Sonar End
        run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: sonarqube
    if: github.event_name == 'push'

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t vlimat-backend:new .

      - name: Stop Existing Container
        run: docker stop vlimat-backend
        continue-on-error: true

      - name: Remove Existing Container
        run: docker rm vlimat-backend
        continue-on-error: true

      - name: Remove Existing Image
        run: docker rmi vlimat-backend
        continue-on-error: true

      - name: Tag New Image
        run: docker tag vlimat-backend:new vlimat-backend

      - name: Run Docker Container
        run: docker run -d --restart unless-stopped -p 5000:8080 --name vlimat-backend vlimat-backend
