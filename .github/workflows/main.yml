name: Deploy Backend

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonarqube:
    name: SonarQube
    runs-on: [self-hosted, windows, x64, backend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: SonarQube Prepare
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=vlimat-Backend
            -Dsonar.sources=.
            -Dsonar.exclusions=**/Tests/**,**/bin/**,**/obj/**,**/node_modules/**
            -Dsonar.cs.vscoveragexml.reportsPaths=coverage.xml

      # Build your project
      - name: Build
        run: dotnet build --no-restore

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  deploy:
    name: Deploy
    runs-on: [self-hosted, windows, x64, backend]
    needs: sonarqube
    if: github.event_name == 'push'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Stop existing container
        run: docker stop vlimat-backend
        continue-on-error: true

      - name: Remove existing container
        run: docker rm vlimat-backend
        continue-on-error: true

      - name: Remove existing image
        run: docker rmi vlimat-backend
        continue-on-error: true

      - name: Build Docker image
        run: docker build -t vlimat-backend .

      - name: Run Docker container
        run: docker run -d --restart unless-stopped -p 5000:8080 --name vlimat-backend vlimat-backend
