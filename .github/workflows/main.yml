name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: self-hosted

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000
        with:
          args: >
            -Dsonar.projectKey=vlimat-backend
            -Dsonar.sources=.
            -Dsonar.exclusions=**/bin/**,**/obj/**,**/node_modules/**

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: sonarqube
    if: github.event_name == 'push'

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t vlimat-backend:new .

      - name: Stop Existing Container
        run: docker stop vlimat-backend
        continue-on-error: true

      - name: Remove Existing Container
        run: docker rm vlimat-backend
        continue-on-error: true

      - name: Remove Existing Image
        run: docker rmi vlimat-backend
        continue-on-error: true

      - name: Tag New Image
        run: docker tag vlimat-backend:new vlimat-backend

      - name: Run Docker Container
        run: docker run -d --restart unless-stopped -p 5000:8080 --name vlimat-backend vlimat-backend
