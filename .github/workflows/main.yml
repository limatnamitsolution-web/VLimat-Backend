name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Cleanup workspace
        shell: powershell
        run: |
          Get-ChildItem -Path $env:GITHUB_WORKSPACE -Force -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install SonarScanner
        shell: powershell
        run: |
          dotnet tool install --global dotnet-sonarscanner
          if ($LASTEXITCODE -ne 0) {
            dotnet tool update --global dotnet-sonarscanner
          }

      - name: Add dotnet tools to PATH
        shell: powershell
        run: |
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show commit and changed test files
        shell: powershell
        run: |
          git rev-parse HEAD
          git status
          Get-ChildItem "$env:GITHUB_WORKSPACE\VLimat.Eduz.App\VLimat.Eduz.App.Test" -Recurse | Select-Object FullName

      - name: SonarQube Begin
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin `
            /k:"vlimat-backend" `
            /d:sonar.host.url="http://localhost:9000" `
            /d:sonar.login="$env:SONAR_TOKEN"

      - name: Restore Dependencies
        shell: powershell
        run: |
          dotnet restore "$env:GITHUB_WORKSPACE\VLimat.Eduz.App\VLimat.Eduz.App\VLimat.Eduz.App.csproj"
          dotnet restore "$env:GITHUB_WORKSPACE\VLimat.Eduz.App\VLimat.Eduz.App.Test\VLimat.Eduz.App.Test.csproj"

      - name: Build App
        shell: powershell
        run: |
          dotnet build "$env:GITHUB_WORKSPACE\VLimat.Eduz.App\VLimat.Eduz.App\VLimat.Eduz.App.csproj" -c Release --no-restore

      - name: Build Test Project
        shell: powershell
        run: |
          dotnet build "$env:GITHUB_WORKSPACE\VLimat.Eduz.App\VLimat.Eduz.App.Test\VLimat.Eduz.App.Test.csproj" -c Release --no-restore

      - name: Run Tests and Finish SonarQube
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet test "$env:GITHUB_WORKSPACE\VLimat.Eduz.App\VLimat.Eduz.App.Test\VLimat.Eduz.App.Test.csproj" -c Release --no-build --logger "trx;LogFileName=TestResults.trx"
          $testExitCode = $LASTEXITCODE
          Write-Host "dotnet test exit code = $testExitCode"

          Get-ChildItem "$env:GITHUB_WORKSPACE" -Recurse -Filter TestResults.trx | Select-Object FullName

          dotnet sonarscanner end /d:sonar.login="$env:SONAR_TOKEN"
          $sonarExitCode = $LASTEXITCODE
          Write-Host "sonarscanner end exit code = $sonarExitCode"

          if ($sonarExitCode -ne 0) {
            Write-Error "SonarQube end failed."
            exit $sonarExitCode
          }

          if ($testExitCode -ne 0) {
            Write-Error "Tests failed."
            exit $testExitCode
          }

      - name: Build Docker Image
        if: success()
        shell: powershell
        run: |
          docker build -t vlimat-backend:new .

      - name: Stop Existing Container
        if: success()
        shell: powershell
        continue-on-error: true
        run: |
          docker stop vlimat-backend

      - name: Remove Existing Container
        if: success()
        shell: powershell
        continue-on-error: true
        run: |
          docker rm vlimat-backend

      - name: Remove Existing Image
        if: success()
        shell: powershell
        continue-on-error: true
        run: |
          docker rmi vlimat-backend

      - name: Tag New Image
        if: success()
        shell: powershell
        run: |
          docker tag vlimat-backend:new vlimat-backend

      - name: Run Docker Container
        if: success()
        shell: powershell
        run: |
          docker run -d --restart unless-stopped -p 5000:8080 --name vlimat-backend vlimat-backend
