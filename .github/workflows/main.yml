name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Sonar Scan and Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Workspace
        shell: powershell
        run: |
          Write-Host "GITHUB_WORKSPACE = $env:GITHUB_WORKSPACE"
          Get-ChildItem $env:GITHUB_WORKSPACE
          Get-ChildItem "$env:GITHUB_WORKSPACE\VLimat.Eduz.App" -Recurse -Filter *.csproj

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install SonarScanner for .NET
        shell: powershell
        run: |
          dotnet tool install --global dotnet-sonarscanner --version 5.12.0
          if ($LASTEXITCODE -ne 0) {
            dotnet tool update --global dotnet-sonarscanner
          }

      - name: Add dotnet tools to PATH
        shell: powershell
        run: |
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: SonarQube Begin
        shell: powershell
        env:
          SONAR_HOST_URL: "http://localhost:9000"
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin `
            /k:"vlimat-backend" `
            /d:sonar.host.url="$env:SONAR_HOST_URL" `
            /d:sonar.login="$env:SONAR_TOKEN"

      - name: Build, Test, and Finish Sonar
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet build "$env:GITHUB_WORKSPACE\VLimat.Eduz.App\VLimat.Eduz.App\VLimat.Eduz.App.csproj" -c Release
          if ($LASTEXITCODE -ne 0) {
            dotnet sonarscanner end /d:sonar.login="$env:SONAR_TOKEN"
            exit $LASTEXITCODE
          }

          dotnet test "$env:GITHUB_WORKSPACE\VLimat.Eduz.App\VLimat.Eduz.App.Test\VLimat.Eduz.App.Test.csproj" -c Release --no-build --logger "trx;LogFileName=TestResults.trx"
          $testExitCode = $LASTEXITCODE

          dotnet sonarscanner end /d:sonar.login="$env:SONAR_TOKEN"
          $sonarExitCode = $LASTEXITCODE

          if ($sonarExitCode -ne 0) {
            exit $sonarExitCode
          }

          exit $testExitCode

      - name: Build Docker Image
        if: success()
        shell: powershell
        run: |
          docker build -t vlimat-backend:new "$env:GITHUB_WORKSPACE"

      - name: Stop Existing Container
        if: success()
        shell: powershell
        run: |
          docker stop vlimat-backend
        continue-on-error: true

      - name: Remove Existing Container
        if: success()
        shell: powershell
        run: |
          docker rm vlimat-backend
        continue-on-error: true

      - name: Remove Existing Image
        if: success()
        shell: powershell
        run: |
          docker rmi vlimat-backend
        continue-on-error: true

      - name: Tag New Image
        if: success()
        shell: powershell
        run: |
          docker tag vlimat-
