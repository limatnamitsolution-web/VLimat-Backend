name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install SonarScanner
        shell: powershell
        run: |
          dotnet tool install --global dotnet-sonarscanner
          if ($LASTEXITCODE -ne 0) {
            dotnet tool update --global dotnet-sonarscanner
          }

      - name: Add dotnet tools to PATH
        shell: powershell
        run: |
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: SonarQube Begin
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin `
            /k:"vlimat-backend" `
            /d:sonar.host.url="http://localhost:9000" `
            /d:sonar.login="$env:SONAR_TOKEN"

      - name: Restore Dependencies
        shell: powershell
        run: |
          dotnet restore "$env:GITHUB_WORKSPACE\VLimat.Eduz.App\VLimat.Eduz.App\VLimat.Eduz.App.csproj"

      - name: Build Project
        shell: powershell
        run: |
          dotnet build "$env:GITHUB_WORKSPACE\VLimat.Eduz.App\VLimat.Eduz.App\VLimat.Eduz.App.csproj" -c Release --no-restore

      - name: Run Tests and Finish SonarQube
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet test "$env:GITHUB_WORKSPACE\VLimat.Eduz.App\VLimat.Eduz.App.Test\VLimat.Eduz.App.Test.csproj" -c Release --no-build --logger "trx;LogFileName=TestResults.trx"
          $testExitCode = $LASTEXITCODE

          dotnet sonarscanner end /d:sonar.login="$env:SONAR_TOKEN"
          $sonarExitCode = $LASTEXITCODE

          if ($sonarExitCode -ne 0) {
            exit $sonarExitCode
          }

          exit $testExitCode

      - name: Build Docker Image
        shell: powershell
        run: |
          docker build -t vlimat-backend:new .

      - name: Stop Existing Container
        shell: powershell
        continue-on-error: true
        run: |
          docker stop vlimat-backend

      - name: Remove Existing Container
        shell: powershell
        continue-on-error: true
        run: |
          docker rm vlimat-backend

      - name: Remove Existing Image
        shell: powershell
        continue-on-error: true
        run: |
          docker rmi vlimat-backend

      - name: Tag New Image
        shell: powershell
        run: |
          docker tag vlimat-backend:new vlimat-backend

      - name: Run Docker Container
        shell: powershell
        run: |
          docker run -d --restart unless-stopped -p 5000:8080 --name vlimat-backend vlimat-backend
